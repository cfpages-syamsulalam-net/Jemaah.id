<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Passenger Details - Jemaah.id</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#075232", "background-light": "#f6f8f7", "background-dark": "#10221a"}, fontFamily: {display: "Work Sans"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        body { font-family: 'Work Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-md mx-auto shadow-xl bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header -->
<div class="flex items-center p-4 pb-2 justify-between sticky top-0 bg-background-light/80 backdrop-blur-md z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Passenger Details</h2>
<div class="size-12"></div> <!-- Spacer for balance -->
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-3 p-4">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium">Booking Progress</p>
<p class="text-slate-600 dark:text-slate-400 text-sm">Step 2 of 5</p>
</div>
<div class="rounded-full bg-primary/20 h-2 w-full">
<div class="h-2 rounded-full bg-primary" style="width: 40%;"></div>
</div>
</div>
<!-- Form Section -->
<div class="px-4 pt-4">
<div class="flex items-center justify-between mb-2">
<h3 class="text-slate-900 dark:text-slate-100 tracking-tight text-2xl font-bold">Passenger 1</h3>
<span class="text-xs bg-primary/10 text-primary font-bold px-2 py-1 rounded">Main Traveler</span>
</div>
<div class="flex flex-col gap-5 py-3">
<!-- Full Name -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold pb-2">Full Name (as per Passport)</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 px-4 text-base transition-all" placeholder="Enter full name" type="text" value="Ahmad Abdullah"/>
</label>
<!-- Passport Number -->
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold pb-2">Passport Number</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 placeholder:text-slate-400 px-4 text-base" placeholder="A12345678" type="text"/>
</label>
<div class="flex gap-4">
<!-- Date of Birth -->
<label class="flex flex-col flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold pb-2">Date of Birth</p>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base" type="date"/>
</label>
<!-- Gender -->
<label class="flex flex-col flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold pb-2">Gender</p>
<select class="form-select flex w-full rounded-xl text-slate-900 dark:text-white border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base">
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>
</label>
</div>
</div>
</div>
<!-- Add Passenger Button -->
<div class="px-4 py-6">
<button class="w-full flex items-center justify-center gap-2 py-4 border-2 border-dashed border-primary text-primary font-bold rounded-xl hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined">person_add</span>
                Add Passenger
            </button>
<p class="text-slate-500 text-xs text-center mt-3">Maximum 5 passengers per booking</p>
</div>
<!-- Trust Indicator -->
<div class="mt-auto px-4 py-6">
<div class="bg-primary/5 rounded-xl p-4 flex items-center gap-3">
<span class="material-symbols-outlined text-primary">verified_user</span>
<div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold">Data stored securely</p>
<p class="text-slate-600 dark:text-slate-400 text-xs">Your information is encrypted and protected by Jemaah Secure Cloud.</p>
</div>
</div>
</div>
<!-- Action Button -->
<div class="p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
                Save &amp; Continue
            </button>
</div>
<!-- Footer Decoration -->
<div class="h-2 bg-primary"></div>
</div>
</body></html>
