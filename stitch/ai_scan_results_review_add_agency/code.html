<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#075232",
                        "background-light": "#f6f8f7",
                        "background-dark": "#10221a",
                    },
                    fontFamily: {
                        "display": ["Work Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Work Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden max-w-md mx-auto border-x border-primary/10">
<!-- Top App Bar -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 pb-2 justify-between sticky top-0 z-10 shadow-sm">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Confirm Scanned Data</h2>
<div class="flex w-12 items-center justify-end">
<p class="text-primary text-base font-bold cursor-pointer">Save</p>
</div>
</div>
<div class="p-4">
<!-- Scan Status Header -->
<div class="flex items-center gap-3 mb-6 bg-primary/5 dark:bg-primary/20 p-4 rounded-xl border border-primary/10">
<div class="bg-primary text-white p-2 rounded-lg">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<div>
<h3 class="text-slate-900 dark:text-slate-100 font-bold">AI Scan Complete</h3>
<p class="text-slate-600 dark:text-slate-400 text-sm">Please verify the extracted details below</p>
</div>
</div>
<!-- Travel Agency Section (Highlight) -->
<div class="mb-8">
<div class="flex items-center justify-between mb-3">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Travel Agency</h3>
<span class="bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400 text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wider border border-amber-200 dark:border-amber-800">Unclaimed</span>
</div>
<div class="bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border border-primary/10">
<div class="flex items-center gap-2 mb-4 text-primary">
<span class="material-symbols-outlined text-xl">new_releases</span>
<span class="text-sm font-semibold italic">New Agency Detected</span>
</div>
<div class="space-y-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5">Agency Name</p>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base" placeholder="Enter agency name from brochure" value="Global Escapes Travel"/>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5">Contact Details</p>
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-base" placeholder="Email or Phone Number" value="+44 20 7946 0123"/>
</label>
</div>
</div>
</div>
<!-- Extracted Package Info -->
<div class="mb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4">Package Details</h3>
<div class="space-y-4">
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5">Package Name</p>
<div class="relative">
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 pr-10 text-base font-normal" value="7-Day Mediterranean Escape"/>
<span class="material-symbols-outlined absolute right-3 top-4 text-slate-400 text-sm">edit</span>
</div>
</label>
<div class="flex gap-4">
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5">Price</p>
<div class="relative">
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base font-normal" value="£1,249"/>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5">Hotel</p>
<div class="relative">
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base font-normal" value="Grand Resort &amp; Spa"/>
</div>
</label>
</div>
<label class="flex flex-col w-full">
<p class="text-slate-700 dark:text-slate-300 text-sm font-medium pb-1.5">Flight Info</p>
<div class="relative">
<input class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 focus:border-primary focus:ring-1 focus:ring-primary h-14 px-4 text-base font-normal" value="Heathrow (LHR) - Direct Economy"/>
</div>
</label>
</div>
</div>
<!-- Brochure Snapshot Preview -->
<div class="mb-8">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-4">Original Scan</h3>
<div class="relative rounded-xl overflow-hidden aspect-video bg-slate-200 border border-slate-300 dark:border-slate-700">
<img alt="Brochure scan" class="w-full h-full object-cover opacity-60" data-alt="Close up scan of a travel brochure showing beach imagery" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPip9G321sfUPUbg3cCS9si1MtEvBm8oLiI1Bf3LPpvuFRhXZiZ2EBi4cNBgFMKYS4AYR7XThw5xy6UE_yEkC-VXOSdEj9AQLziBt9eFgFlq_nFIygYsK_87rqkBkGu6hl6G2ZFnkKJvdGo1Fk1B7fxJtt0tjRGEs1r9Sw4tSrkXHGoUbPqf7j7TUMdRQ85cGELoRocCy86kRAchhihWMHZBivLBA2ISBSNXO-Du5OWMsatOofYNq_IpFmzg-E5gVTro_YWqOaVw8"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-white/90 dark:bg-slate-900/90 px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
<span class="material-symbols-outlined text-primary">zoom_in</span>
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">Tap to View Original</span>
</div>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-3 pb-10">
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">check_circle</span>
                    Confirm and Add to Trips
                </button>
<button class="bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 font-bold py-4 rounded-xl transition-all">
                    Discard Scan
                </button>
</div>
</div>
</div>
</body></html>
